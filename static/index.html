<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#f8f7ff">
  <title>TvHeadend Manager</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/app.css?v=1.0.0">
</head>
<body>
  <aside class="rail" id="rail">
    <button class="icon-btn menu-btn" id="menuBtn" aria-label="展开或收起菜单"><span>☰</span></button>
    <div class="brand"><div class="brand-mark">TV</div><span>TvHeadend Manager</span></div>
    <nav id="nav">
      <button data-view="dashboard" class="active"><i><svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="7" height="7" rx="2"/><rect x="13.5" y="3.5" width="7" height="7" rx="2"/><rect x="3.5" y="13.5" width="7" height="7" rx="2"/><rect x="13.5" y="13.5" width="7" height="7" rx="2"/></svg></i><span>概览</span></button>
      <button data-view="epg"><i><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="4"/><path d="m8 3 4 3 4-3M7 11h10M7 15h6"/></svg></i><span>节目单</span></button>
      <button data-view="viewers"><i><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20v-1.5c0-3.1 2.3-5.2 5.5-5.2s5.5 2.1 5.5 5.2V20M16 11a3 3 0 1 0 0-6M16.5 14c2.6.2 4 1.9 4 4.3V20"/></svg></i><span>观看记录</span></button>
      <button data-view="channels"><i><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="4"/><path d="m8 3 4 3 4-3M10 9.5l6 3.5-6 3.5Z"/></svg></i><span>频道</span></button>
      <button data-view="status"><i><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><path d="M8.5 15.5a5 5 0 1 1 7 0M5.5 18.5a9.2 9.2 0 1 1 13 0M12 13.5V22"/></svg></i><span>信号</span></button>
      <button data-view="recordings"><i><svg viewBox="0 0 24 24"><rect x="3" y="6" width="15" height="13" rx="3"/><path d="m18 10 3-2v9l-3-2M8 6V4h5v2"/></svg></i><span>录像</span></button>
      <button data-view="clients"><i><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="13" rx="3"/><path d="M8 21h8M12 18v3M7 10h.01M10 10h7"/></svg></i><span>客户端</span></button>
      <button data-view="system"><i><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="7" rx="2.5"/><rect x="3" y="14" width="18" height="7" rx="2.5"/><path d="M7 6.5h.01M7 17.5h.01M11 6.5h6M11 17.5h6"/></svg></i><span>系统资源</span></button>
      <button data-view="settings"><i><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.2a7.8 7.8 0 0 0 0-2.4l2-1.5-2-3.5-2.5 1a8 8 0 0 0-2-1.2L14.6 3h-5.2L9 5.6a8 8 0 0 0-2 1.2l-2.5-1-2 3.5 2 1.5a7.8 7.8 0 0 0 0 2.4l-2 1.5 2 3.5 2.5-1a8 8 0 0 0 2 1.2l.4 2.6h5.2l.4-2.6a8 8 0 0 0 2-1.2l2.5 1 2-3.5Z"/></svg></i><span>连接设置</span></button>
    </nav>
    <div class="rail-bottom">
      <div class="connection"><b id="statusDot"></b><span id="connectionText">正在检查</span></div>
    </div>
  </aside>

  <main>
    <div class="top-space"></div>
    <div class="content">
      <header class="page-head">
        <div><p class="eyebrow" id="eyebrow">实时状态</p><h1 id="pageTitle">概览</h1></div>
        <div class="head-actions"><span id="updatedAt">尚未同步</span><button class="tonal refresh-btn" id="refreshBtn" aria-label="刷新当前页面" title="刷新"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.8 9A7.5 7.5 0 1 0 19.5 14"/><path d="M19 4v5h-5"/></svg></button></div>
      </header>
      <div id="notice" class="notice hidden"></div>
      <section id="view" aria-live="polite"><div class="skeleton big"></div></section>
    </div>
  </main>

  <dialog id="loginDialog" class="login-dialog" tabindex="-1">
    <form id="loginForm">
      <div class="setup-symbol"><img src="/favicon.svg" alt=""></div>
      <p class="eyebrow">外部访问</p>
      <h2>登录 TvHeadend Manager</h2>
      <p class="muted">此连接来自外部网络，请先验证身份。局域网设备不会看到此页面。</p>
      <label class="md-field"><input name="username" autocomplete="username" placeholder=" " required><span>用户名</span></label>
      <label class="md-field"><input name="password" type="password" autocomplete="current-password" placeholder=" " required><span>密码</span></label>
      <div id="loginError" class="form-error"></div>
      <button class="primary" id="loginSubmit" type="submit">登录</button>
      <small>登录信息只用于本次验证，不会保存在浏览器或数据库中。</small>
    </form>
  </dialog>

  <dialog id="setupDialog" tabindex="-1">
    <form id="setupForm" method="dialog">
      <div class="setup-symbol"><img src="/favicon.svg" alt=""></div>
      <p class="eyebrow" id="setupEyebrow">第一次使用</p>
      <h2 id="setupTitle">连接 TvHeadend</h2>
      <p class="muted">请使用拥有管理员权限的账号，才能读取输入、订阅和系统状态。</p>
      <label class="md-field"><input name="url" type="url" placeholder=" " required><span>TvHeadend 地址</span></label>
      <label class="md-field"><input name="username" autocomplete="username" placeholder=" " required><span>用户名</span></label>
      <label class="md-field"><input name="password" type="password" autocomplete="current-password" placeholder=" "><span>密码</span></label>
      <div id="setupError" class="form-error"></div>
      <div class="setup-actions">
        <button class="tonal hidden" id="setupCancel" type="button">取消</button>
        <button class="primary" id="setupSubmit" type="submit">连接并开始同步</button>
      </div>
      <small>配置保存在本机 SQLite 数据库中。请限制数据目录和网页端口的访问。</small>
    </form>
  </dialog>

  <dialog id="clientDisconnectDialog" class="confirm-dialog" tabindex="-1">
    <form id="clientDisconnectForm">
      <p class="eyebrow">客户端管理</p><h2>断开这个客户端？</h2>
      <p class="muted" id="clientDisconnectCopy"></p>
      <div id="clientDisconnectError" class="form-error"></div>
      <div class="setup-actions"><button class="tonal" id="clientDisconnectBack" type="button">返回</button><button class="primary danger-action" id="clientDisconnectSubmit" type="submit">确认断开</button></div>
    </form>
  </dialog>
  <script src="/app.js?v=1.0.0" defer></script>
</body>
</html>
