services:
  tvheadend-manager:
    build: .
    container_name: tvheadend-manager
    restart: unless-stopped
    ports:
      - "8088:8088"
      # 启用安全转发端口后，还要在这里映射相同端口，例如：
      # - "9991:9991"
    volumes:
      - tvh-data:/data
    environment:
      TZ: Asia/Shanghai
      TVHMON_POLL_SECONDS: 10
      TVHMON_FULL_SYNC_SECONDS: 300
      # 公网或不可信局域网部署时务必取消注释并修改：
      # TVHMON_WEB_USERNAME: admin
      # TVHMON_WEB_PASSWORD: change-me
      # 也可用环境变量固定转发端口，0 表示关闭：
      # TVHMON_FORWARD_PORT: 9991

volumes:
  tvh-data:
