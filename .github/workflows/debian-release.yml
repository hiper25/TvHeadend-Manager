name: Debian single-file release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to build, for example v1.2.2
        required: true
        type: string

concurrency:
  group: debian-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    if: startsWith(inputs.tag || github.ref_name, 'v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build inside Debian 12
        run: |
          docker run --rm \
            --env HOST_UID="$(id -u)" \
            --env HOST_GID="$(id -g)" \
            --volume "$GITHUB_WORKSPACE:/src" \
            --workdir /src \
            debian:12-slim \
            sh -ec '
              apt-get update
              apt-get install -y --no-install-recommends python3 python3-dev python3-venv ca-certificates binutils
              ./scripts/build-binary.sh
              chown -R "$HOST_UID:$HOST_GID" .build-venv build dist
            '

      - name: Verify and name release files
        run: |
          version="$(./dist/tvheadend-manager --version)"
          expected="${RELEASE_TAG#v}"
          test "$version" = "$expected"
          mkdir -p release
          install -m 0755 ./dist/tvheadend-manager "release/tvheadend-manager-${expected}-debian12-${{ matrix.arch }}"
          cd release
          sha256sum "tvheadend-manager-${expected}-debian12-${{ matrix.arch }}" > "tvheadend-manager-${expected}-debian12-${{ matrix.arch }}.sha256"

      - name: Upload architecture artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: debian-${{ matrix.arch }}
          path: release/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout service files
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download all architecture artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: debian-*
          path: release
          merge-multiple: true

      - name: Verify downloaded files
        run: |
          test -f release/tvheadend-manager-*-debian12-amd64
          test -f release/tvheadend-manager-*-debian12-arm64
          chmod 0755 release/tvheadend-manager-*-debian12-amd64
          chmod 0755 release/tvheadend-manager-*-debian12-arm64
          cd release
          sha256sum -c ./*.sha256

      - name: Add systemd service files
        run: |
          install -m 0644 packaging/tvheadend-manager.service release/tvheadend-manager.service
          install -m 0644 packaging/tvheadend-manager.env.example release/tvheadend-manager.env.example

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "TvHeadend Manager ${RELEASE_TAG#v}"
          fi
